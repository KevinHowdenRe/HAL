<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HAL</title>
  <style>
    :root{
      --border:#e5e7eb;
      --muted:#6b7280;
      --link:#2563eb;
      --bg:#ffffff;
      --soft:#f9fafb;
    }
    body{
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin:0;
      height:100vh;
      display:flex;
      background:var(--bg);
      color:#111827;
    }
    aside{
      width:320px;
      border-right:1px solid var(--border);
      padding:14px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    main{
      flex:1;
      padding:14px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .title{
      font-weight:700;
      font-size:18px;
      letter-spacing:0.2px;
      margin:0;
    }
    .btn{
      border:1px solid var(--border);
      background:white;
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
    }
    .btn:hover{ background:var(--soft); }
    .muted{ color:var(--muted); font-size:12px; }
    select{
      width:100%;
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      background:white;
      box-sizing:border-box;
    }
    #menu{
      overflow:auto;
      padding-right:4px;
    }
    .section{
      margin-top:8px;
    }
    .section-title{
      font-weight:700;
      font-size:12px;
      color:#374151;
      margin:14px 0 6px 0;
      text-transform:lowercase; /* matches your screenshot vibe ("docs") */
    }
    a.menu-item{
      display:block;
      padding:6px 0;
      color:var(--link);
      text-decoration:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    a.menu-item:hover{ text-decoration:underline; }
    .pill{
      display:inline-block;
      padding:2px 8px;
      border:1px solid var(--border);
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
    }

    /* iframe wrapper + spinner */
    #frameWrap{ position:relative; flex:1; min-height:0; }
    #spinner{
      position:absolute; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background:rgba(255,255,255,0.75);
      backdrop-filter: blur(2px);
      z-index:10;
    }
    #spinner .dot{
      width:34px;height:34px;border:4px solid #ddd;border-top-color:var(--link);
      border-radius:50%;
      display:inline-block;
      animation:spin 0.8s linear infinite;
    }
    #spinner .label{ margin-top:10px; color:var(--muted); font-size:13px; text-align:center; }
    @keyframes spin{ to{ transform:rotate(360deg);} }

    iframe{
      width:100%;
      height:100%;
      border:1px solid var(--border);
      border-radius:10px;
    }

    /* small status */
    #status{ color:var(--muted); font-size:12px; }
    .danger{ color:#b91c1c; }
  </style>
</head>

<body>
  <aside>
    <div>
      <div class="title">HAL</div>
      <div class="muted">Select a view (audience) to load your menu.</div>
    </div>

    <div>
      <div class="muted" style="margin-bottom:6px;">Audience</div>
      <select id="audience"></select>
    </div>

    <div id="menu"></div>

    <div id="status"></div>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <span class="pill" id="currentUrl">-</span>
      </div>
      <button class="btn" id="btnAuth">Login</button>
    </div>

    <div id="frameWrap">
      <div id="spinner">
        <div style="text-align:center;">
          <div class="dot"></div>
          <div class="label">Loading…</div>
        </div>
      </div>
      <iframe id="frame" referrerpolicy="no-referrer"></iframe>
    </div>
  </main>

 <script src="app.js"></script>
</body>
</html>
