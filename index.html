<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HAL</title>
  <style>
    :root{
      --border:#e5e7eb;
      --muted:#6b7280;
      --link:#2563eb;
      --bg:#ffffff;
      --soft:#f9fafb;
      --text:#111827;
    }
    body{
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin:0;
      height:100vh;
      display:flex;
      background:var(--bg);
      color:var(--text);
    }
    aside{
      width:320px;
      border-right:1px solid var(--border);
      padding:14px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow:hidden;
    }
	/* LEFT PANEL COLOR THEME */
	aside{
	  background:#173F35;
	  color:#fff;
	  border-right:1px solid rgba(255,255,255,0.12); /* optionnel */
	}

	/* Tout le texte “muted” en version claire */
	aside .muted{
	  color:rgba(255,255,255,0.75);
	}

	/* Dropdown / inputs visibles sur fond dark */
	aside select{
	  background:rgba(255,255,255,0.10);
	  border:1px solid rgba(255,255,255,0.18);
	  color:#fff;
	}
	aside select option{
	  color:#111827; /* pour que les options restent lisibles dans le menu natif */
	}

	/* Menu items : blanc + gras */
	aside a.menu-item{
	  color:#fff;
	  font-weight:700;
	  border-bottom:1px solid rgba(255,255,255,0.12);
	}

	/* Le petit compteur à droite */
	aside a.menu-item .count{
	  color:rgba(255,255,255,0.75);
	  font-weight:600;
	}

	/* Hover : léger highlight */
	aside a.menu-item:hover{
	  background:rgba(255,255,255,0.06);
	  text-decoration:none;         /* tu peux laisser underline si tu veux */
	}

	/* L'état actif (cliqué) */
	aside a.menu-item.active{
	  background:#218D80;
	  border-radius:10px;
	  padding-left:10px;
	  padding-right:10px;
	}
	aside a.menu-item.active .count{
	  color:rgba(255,255,255,0.9);
	}
		
		
		
		
		
		
	
	
	
    main{
      flex:1;
      padding:14px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .title{
      font-weight:750;
      font-size:24px;
      letter-spacing:0.2px;
      margin:0;
	  margin-bottom:12px;
    }
    .btn{
      border:1px solid var(--border);
      background:white;
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
    }
    .btn:hover{ background:var(--soft); }
    .muted{ color:var(--muted); font-size:12px; }
    select{
      width:100%;
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      background:white;
      box-sizing:border-box;
    }
	
    /* left menu */
	
	#audienceWrap{
	  margin-bottom:16px;
	}

    #menu{
      overflow:auto;
      padding-right:4px;
      border-top:1px solid var(--border);
      padding-top:10px;
    }
    a.menu-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:7px 0;
      color:var(--link);
      text-decoration:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      border-bottom:1px solid rgba(229,231,235,0.45);
    }
    a.menu-item:hover{ text-decoration:underline; }
    .count{
      color:var(--muted);
      font-size:12px;
      flex:0 0 auto;
    }
    .pill{
      display:inline-block;
      padding:2px 8px;
      border:1px solid var(--border);
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    /* iframe wrapper + spinner */
    #frameWrap{ position:relative; flex:1; min-height:0; }
    #spinner{
      position:absolute; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background:rgba(255,255,255,0.75);
      backdrop-filter: blur(2px);
      z-index:10;
    }
    #spinner .dot{
      width:34px;height:34px;border:4px solid #ddd;border-top-color:var(--link);
      border-radius:50%;
      display:inline-block;
      animation:spin 0.8s linear infinite;
    }
    #spinner .label{ margin-top:10px; color:var(--muted); font-size:13px; text-align:center; }
    @keyframes spin{ to{ transform:rotate(360deg);} }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }
	
	#fixedTop{ margin-bottom:8px; }
	#fixedBottom{ margin-top:8px; }

	#fixedTop, #fixedBottom{
	  border-bottom:1px solid rgba(229,231,235,0.25);
	  padding-bottom:6px;
	}

	#fixedBottom{
	  border-bottom:none;
	  border-top:1px solid rgba(229,231,235,0.25);
	  padding-top:6px;
	  padding-bottom:0;
	}
	
    /* status */
    #status{ color:var(--muted); font-size:12px; }
    .danger{ color:#b91c1c; }
  </style>
</head>

<body>
  <aside>
    <div>
      <div class="title">HAL</div>
      <div id="audienceWrap" style="display:none;">
 
  <div>
    <div class="muted" style="margin-bottom:6px;">Audience</div>
    <select id="audience"></select>
  </div>
</div>
	<div id="fixedTop"></div>
    <div id="menu"></div>
	<div id="fixedBottom"></div>

    <div id="status"></div>
  </aside>

  <main>
    <div class="topbar">
      <span class="pill" id="currentUrl">-</span>
      <button class="btn" id="btnAuth">Login</button>
    </div>

    <div id="frameWrap">
      <div id="spinner">
        <div style="text-align:center;">
          <div class="dot"></div>
          <div class="label">Loading…</div>
        </div>
      </div>
      <iframe id="frame" referrerpolicy="no-referrer"></iframe>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
