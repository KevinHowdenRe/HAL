<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HAL</title>
  <style>
    :root{
      --border:#e5e7eb;
      --muted:#6b7280;
      --link:#2563eb;
      --bg:#ffffff;
      --soft:#f9fafb;
      --text:#111827;

      /* NEW theme */
      --brand:#173F35;
      --brandActive:#218D80;
      --onBrand:#ffffff;
      --onBrandMuted: rgba(255,255,255,0.75);
      --onBrandBorder: rgba(255,255,255,0.18);
    }

    body{
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin:0;
      height:100vh;
      display:flex;
      background:var(--bg);
      color:var(--text);
    }

    aside{
      width:320px;
      border-right:1px solid var(--onBrandBorder);
      padding:14px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:12px;
      overflow:hidden;

      /* NEW */
      background: var(--brand);
      color: var(--onBrand);
    }

    main{
      flex:1;
      padding:14px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    /* TOP BAR */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;

      /* NEW */
      background: var(--brand);
      color: var(--onBrand);
      border-radius:12px;
      padding:10px 12px;
    }

    .topbar-left{
      display:flex;
      align-items:flex-end;
      gap:14px;
      min-width:0;
      flex:1;
    }

    .audienceBlock{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width: 280px;
      max-width: 420px;
    }

    .title{
      font-weight:700;
      font-size:18px;
      letter-spacing:0.2px;
      margin:0;

      /* NEW (sidebar title stays white) */
      color: var(--onBrand);
    }

    .muted{
      color:var(--muted);
      font-size:12px;
    }

    /* NEW muted on dark */
    aside .muted{ color: var(--onBrandMuted); }
    .topbar .muted{ color: var(--onBrandMuted); }

    .btn{
      border:1px solid var(--onBrandBorder);
      background: rgba(255,255,255,0.10);
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;

      color: var(--onBrand);
    }
    .btn:hover{ background: rgba(255,255,255,0.16); }

    select{
      width:100%;
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      background:white;
      box-sizing:border-box;
    }

    /* Make dropdown fit topbar on dark background */
    .topbar select{
      border: 1px solid rgba(0,0,0,0.08);
    }

    /* left menu */
    #menu{
      overflow:auto;
      padding-right:4px;
      border-top:1px solid var(--onBrandBorder);
      padding-top:10px;
    }

    a.menu-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;

      /* NEW: clickable area + active bg */
      padding:10px 10px;
      border-radius:10px;

      /* NEW: typography & colors */
      color: var(--onBrand);
      font-weight: 700;
      text-decoration:none;

      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;

      /* subtle separator without “hard border” */
      border-bottom:1px solid rgba(255,255,255,0.10);
    }

    a.menu-item:hover{
      background: rgba(255,255,255,0.08);
      text-decoration:none;
    }

    /* NEW active state */
    a.menu-item.active{
      background: var(--brandActive);
    }

    .count{
      color: rgba(255,255,255,0.80);
      font-size:12px;
      flex:0 0 auto;
      font-weight: 700;
    }

    .pill{
      display:inline-block;
      padding:2px 10px;
      border:1px solid var(--onBrandBorder);
      border-radius:999px;
      font-size:12px;
      color: var(--onBrand);
      background: rgba(255,255,255,0.08);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
      min-width: 0;
    }

    /* iframe wrapper + spinner */
    #frameWrap{ position:relative; flex:1; min-height:0; }

    #spinner{
      position:absolute; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background:rgba(255,255,255,0.75);
      backdrop-filter: blur(2px);
      z-index:10;
    }
    #spinner .dot{
      width:34px;height:34px;border:4px solid #ddd;border-top-color:#2563eb;
      border-radius:50%;
      display:inline-block;
      animation:spin 0.8s linear infinite;
    }
    #spinner .label{ margin-top:10px; color:#6b7280; font-size:13px; text-align:center; }
    @keyframes spin{ to{ transform:rotate(360deg);} }

    /* NEW: remove iframe contours */
    iframe{
      width:100%;
      height:100%;
      border:0;
      border-radius:0;
      outline:none;
      box-shadow:none;
      background: white;
    }

    /* status */
    #status{ color: var(--onBrandMuted); font-size:12px; }
    .danger{ color:#ffb4b4; }
  </style>
</head>
<body>
  <aside>
    <div>
      <div class="title">HAL</div>
      <!-- removed "Select a view..." from here -->
    </div>

    <div id="menu"></div>
    <div id="status"></div>
  </aside>

  <main>
    <div class="topbar">
      <div class="topbar-left">
        <div class="audienceBlock">
          <div class="muted">Select a view (audience) to load your menu.</div>
          <div>
            <div class="muted" style="margin-bottom:6px;">Audience</div>
            <select id="audience"></select>
          </div>
        </div>

        <!-- pill just after the dropdown (as requested) -->
        <span class="pill" id="currentUrl">-</span>
      </div>

      <button class="btn" id="btnAuth">Login</button>
    </div>

    <div id="frameWrap">
      <div id="spinner">
        <div style="text-align:center;">
          <div class="dot"></div>
          <div class="label">Loading…</div>
        </div>
      </div>
      <iframe id="frame" referrerpolicy="no-referrer"></iframe>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
